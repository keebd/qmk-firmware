name: "Ergodash Mini Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/ergodash_mini.yml
    - ergodash_mini/**

jobs:
  ergodash_mini-default-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: omkbd/ergodash/mini
          keymap: default
          controller: helios
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: ergodash_mini-default-helios
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  ergodash_mini-via-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: omkbd/ergodash/mini
          keymap: via
          controller: helios
          output-dir: build-output
          local-keymap-path: ergodash_mini/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: ergodash_mini-via-helios
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  ergodash_mini-default-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: omkbd/ergodash/mini
          keymap: default
          controller: svlinky
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: ergodash_mini-default-svlinky
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  ergodash_mini-via-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: omkbd/ergodash/mini
          keymap: via
          controller: svlinky
          output-dir: build-output
          local-keymap-path: ergodash_mini/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: ergodash_mini-via-svlinky
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  ergodash_mini-release:
    needs:
      - ergodash_mini-default-helios
      - ergodash_mini-via-helios
      - ergodash_mini-default-svlinky
      - ergodash_mini-via-svlinky
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ergodash_mini-firmware
          name: Ergodash Mini Firmware (latest)
          body: |
            Latest Ergodash Mini Firmware, built automatically from `main`.

            Download the firmware matching your keymap and controller, then flash it.
          files: |
            firmware/*.uf2
            firmware/*.hex
            firmware/*.bin
