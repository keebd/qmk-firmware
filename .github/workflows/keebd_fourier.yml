name: "KEEBD Fourier Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/keebd_fourier.yml
    - keebd_fourier/**

jobs:
  keebd-fourier-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: keebd_fourier
          keymap: default
          controller: helios
          output-dir: build-output
          local-keyboard-path: keebd_fourier
      - uses: actions/upload-artifact@v4
        with:
          name: keebd-fourier-helios
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  keebd-fourier-via-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: keebd_fourier
          keymap: via
          controller: helios
          output-dir: build-output
          local-keyboard-path: keebd_fourier
      - uses: actions/upload-artifact@v4
        with:
          name: keebd-fourier-via-helios
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  keebd-fourier-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: keebd_fourier
          keymap: default
          controller: svlinky
          output-dir: build-output
          local-keyboard-path: keebd_fourier
      - uses: actions/upload-artifact@v4
        with:
          name: keebd-fourier-svlinky
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  keebd-fourier-via-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: keebd_fourier
          keymap: via
          controller: svlinky
          output-dir: build-output
          local-keyboard-path: keebd_fourier
      - uses: actions/upload-artifact@v4
        with:
          name: keebd-fourier-via-svlinky
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  keebd_fourier-release:
    needs:
      - keebd-fourier-helios
      - keebd-fourier-via-helios
      - keebd-fourier-svlinky
      - keebd-fourier-via-svlinky
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: keebd_fourier-firmware
          name: KEEBD Fourier Firmware (latest)
          body: |
            Latest KEEBD Fourier Firmware, built automatically from `main`.

            Download the firmware matching your keymap and controller, then flash it.
          files: |
            firmware/*.uf2
            firmware/*.hex
            firmware/*.bin
