name: "Basketweave Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/basketweave.yml
    - basketweave/**

jobs:
  basketweave-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: basketweave
          keymap: default
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: basketweave-default
          path: build-output/*.uf2
          if-no-files-found: error

  basketweave-via:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: basketweave
          keymap: via
          output-dir: build-output
          local-keymap-path: basketweave/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: basketweave-via
          path: build-output/*.uf2
          if-no-files-found: error

  basketweave-release:
    needs:
      - basketweave-default
      - basketweave-via
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: basketweave-firmware
          name: Basketweave Firmware (latest)
          body: |
            Latest Basketweave Firmware, built automatically from `main`.

            Download the `.uf2` matching your keymap and controller, then flash it.
          files: firmware/*.uf2
