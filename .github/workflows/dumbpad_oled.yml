name: "Dumbpad OLED Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/dumbpad_oled.yml
    - dumbpad_oled/**

jobs:
  dumbpad_oled-default-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: dumbpad/v1x_oled
          keymap: default
          controller: helios
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: dumbpad_oled-default-helios
          path: build-output/*.uf2
          if-no-files-found: error

  dumbpad_oled-via-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: dumbpad/v1x_oled
          keymap: via
          controller: helios
          output-dir: build-output
          local-keymap-path: dumbpad_oled/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: dumbpad_oled-via-helios
          path: build-output/*.uf2
          if-no-files-found: error

  dumbpad_oled-default-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: dumbpad/v1x_oled
          keymap: default
          controller: svlinky
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: dumbpad_oled-default-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  dumbpad_oled-via-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: dumbpad/v1x_oled
          keymap: via
          controller: svlinky
          output-dir: build-output
          local-keymap-path: dumbpad_oled/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: dumbpad_oled-via-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  dumbpad_oled-release:
    needs:
      - dumbpad_oled-default-helios
      - dumbpad_oled-via-helios
      - dumbpad_oled-default-svlinky
      - dumbpad_oled-via-svlinky
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: dumbpad_oled-firmware
          name: Dumbpad OLED Firmware (latest)
          body: |
            Latest Dumbpad OLED Firmware, built automatically from `main`.

            Download the `.uf2` matching your keymap and controller, then flash it.
          files: firmware/*.uf2
