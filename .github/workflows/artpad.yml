name: "ArtPad Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/artpad.yml
    - artpad/**

jobs:
  artpad-default-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: artpad
          keymap: default
          controller: helios
          output-dir: build-output
          local-keyboard-path: artpad
      - uses: actions/upload-artifact@v4
        with:
          name: artpad-default-helios
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  artpad-via-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: artpad
          keymap: via
          controller: helios
          output-dir: build-output
          local-keyboard-path: artpad
      - uses: actions/upload-artifact@v4
        with:
          name: artpad-via-helios
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  artpad-vial-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@vial-qmk
        with:
          keyboard: artpad
          keymap: vial
          controller: helios
          output-dir: build-output
          local-keyboard-path: artpad
      - uses: actions/upload-artifact@v4
        with:
          name: artpad-vial-helios
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  artpad-vial-keebd-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@vial-qmk
        with:
          keyboard: artpad
          keymap: vial-keebd
          controller: helios
          output-dir: build-output
          local-keyboard-path: artpad
      - uses: actions/upload-artifact@v4
        with:
          name: artpad-vial-keebd-helios
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  artpad-default-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: artpad
          keymap: default
          controller: svlinky
          output-dir: build-output
          local-keyboard-path: artpad
      - uses: actions/upload-artifact@v4
        with:
          name: artpad-default-svlinky
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  artpad-via-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: artpad
          keymap: via
          controller: svlinky
          output-dir: build-output
          local-keyboard-path: artpad
      - uses: actions/upload-artifact@v4
        with:
          name: artpad-via-svlinky
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  artpad-vial-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@vial-qmk
        with:
          keyboard: artpad
          keymap: vial
          controller: svlinky
          output-dir: build-output
          local-keyboard-path: artpad
      - uses: actions/upload-artifact@v4
        with:
          name: artpad-vial-svlinky
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  artpad-release:
    needs:
      - artpad-default-helios
      - artpad-via-helios
      - artpad-vial-helios
      - artpad-vial-keebd-helios
      - artpad-default-svlinky
      - artpad-via-svlinky
      - artpad-vial-svlinky
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: artpad-firmware
          name: ArtPad Firmware (latest)
          body: |
            Latest ArtPad Firmware, built automatically from `main`.

            Download the firmware matching your keymap and controller, then flash it.
          files: |
            firmware/*.uf2
            firmware/*.hex
            firmware/*.bin
