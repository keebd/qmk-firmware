name: "ModelH Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/modelh.yml
    - modelh/**

jobs:
  modelh-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: ibm/model_m/modelh
          keymap: default
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: modelh-default
          path: build-output/*.uf2
          if-no-files-found: error

  modelh-via:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: ibm/model_m/modelh
          keymap: via
          output-dir: build-output
          local-keymap-path: modelh/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: modelh-via
          path: build-output/*.uf2
          if-no-files-found: error

  modelh-vial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@vial-qmk
        with:
          keyboard: ibm/model_m/modelh
          keymap: vial
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: modelh-vial
          path: build-output/*.uf2
          if-no-files-found: error

  modelh-release:
    needs:
      - modelh-default
      - modelh-via
      - modelh-vial
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: modelh-firmware
          name: ModelH Firmware (latest)
          body: |
            Latest ModelH Firmware, built automatically from `main`.

            Download the `.uf2` matching your keymap and controller, then flash it.
          files: firmware/*.uf2
