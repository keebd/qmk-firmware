name: "ChocV Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/chocv.yml
    - chocv/**

jobs:
  chocv-default-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: chocv
          keymap: default
          controller: helios
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: chocv-default-helios
          path: build-output/*.uf2
          if-no-files-found: error

  chocv-via-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: chocv
          keymap: via
          controller: helios
          output-dir: build-output
          local-keymap-path: chocv/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: chocv-via-helios
          path: build-output/*.uf2
          if-no-files-found: error

  chocv-default-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: chocv
          keymap: default
          controller: svlinky
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: chocv-default-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  chocv-via-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: chocv
          keymap: via
          controller: svlinky
          output-dir: build-output
          local-keymap-path: chocv/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: chocv-via-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  chocv-release:
    needs:
      - chocv-default-helios
      - chocv-via-helios
      - chocv-default-svlinky
      - chocv-via-svlinky
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: chocv-firmware
          name: ChocV Firmware (latest)
          body: |
            Latest ChocV Firmware, built automatically from `main`.

            Download the `.uf2` matching your keymap and controller, then flash it.
          files: firmware/*.uf2
