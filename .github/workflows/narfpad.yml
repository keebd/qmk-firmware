name: "Narfpad Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/narfpad.yml
    - narfpad/**

jobs:
  narfpad-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: narfpad
          output-dir: build-output
          local-keyboard-path: narfpad
      - uses: actions/upload-artifact@v4
        with:
          name: narfpad-default
          path: build-output/*.uf2
          if-no-files-found: error

  narfpad-via:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: narfpad
          keymap: via
          output-dir: build-output
          local-keyboard-path: narfpad
      - uses: actions/upload-artifact@v4
        with:
          name: narfpad-via
          path: build-output/*.uf2
          if-no-files-found: error

  narfpad-release:
    needs:
      - narfpad-default
      - narfpad-via
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: narfpad-firmware
          name: Narfpad Firmware (latest)
          body: |
            Latest Narfpad Firmware, built automatically from `main`.

            Download the `.uf2` matching your keymap and controller, then flash it.
          files: firmware/*.uf2
