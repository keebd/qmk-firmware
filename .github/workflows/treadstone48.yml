name: "Treadstone48 Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/treadstone48.yml
    - treadstone48/**

jobs:
  treadstone48-default-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: marksard/treadstone48
          keymap: default
          controller: helios
          pin-compatible: promicro
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: treadstone48-default-helios
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  treadstone48-via-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: marksard/treadstone48
          keymap: via
          controller: helios
          pin-compatible: promicro
          output-dir: build-output
          local-keymap-path: treadstone48/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: treadstone48-via-helios
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  treadstone48-default-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: marksard/treadstone48
          keymap: default
          controller: svlinky
          pin-compatible: promicro
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: treadstone48-default-svlinky
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  treadstone48-via-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: marksard/treadstone48
          keymap: via
          controller: svlinky
          pin-compatible: promicro
          output-dir: build-output
          local-keymap-path: treadstone48/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: treadstone48-via-svlinky
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  treadstone48-release:
    needs:
      - treadstone48-default-helios
      - treadstone48-via-helios
      - treadstone48-default-svlinky
      - treadstone48-via-svlinky
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: treadstone48-firmware
          name: Treadstone48 Firmware (latest)
          body: |
            Latest Treadstone48 Firmware, built automatically from `main`.

            Download the firmware matching your keymap and controller, then flash it.
          files: |
            firmware/*.uf2
            firmware/*.hex
            firmware/*.bin
