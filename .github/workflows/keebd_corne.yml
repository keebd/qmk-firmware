name: "KEEBD Corne Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/keebd_corne.yml
    - keebd_corne/**

jobs:
  keebd-corne-default-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: keebd_corne
          keymap: default
          controller: helios
          output-dir: build-output
          local-keyboard-path: keebd_corne
      - uses: actions/upload-artifact@v4
        with:
          name: keebd-corne-default-helios
          path: build-output/*.uf2
          if-no-files-found: error

  keebd-corne-via-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: keebd_corne
          keymap: via
          controller: helios
          output-dir: build-output
          local-keyboard-path: keebd_corne
      - uses: actions/upload-artifact@v4
        with:
          name: keebd-corne-via-helios
          path: build-output/*.uf2
          if-no-files-found: error

  keebd-corne-vial-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@vial-qmk
        with:
          keyboard: keebd_corne
          keymap: vial
          controller: helios
          output-dir: build-output
          local-keyboard-path: keebd_corne
      - uses: actions/upload-artifact@v4
        with:
          name: keebd-corne-vial-helios
          path: build-output/*.uf2
          if-no-files-found: error

  keebd-corne-default-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: keebd_corne
          keymap: default
          controller: svlinky
          output-dir: build-output
          local-keyboard-path: keebd_corne
      - uses: actions/upload-artifact@v4
        with:
          name: keebd-corne-default-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  keebd-corne-via-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: keebd_corne
          keymap: via
          controller: svlinky
          output-dir: build-output
          local-keyboard-path: keebd_corne
      - uses: actions/upload-artifact@v4
        with:
          name: keebd-corne-via-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  keebd-corne-vial-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@vial-qmk
        with:
          keyboard: keebd_corne
          keymap: vial
          controller: svlinky
          output-dir: build-output
          local-keyboard-path: keebd_corne
      - uses: actions/upload-artifact@v4
        with:
          name: keebd-corne-vial-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  keebd_corne-release:
    needs:
      - keebd-corne-default-helios
      - keebd-corne-via-helios
      - keebd-corne-vial-helios
      - keebd-corne-default-svlinky
      - keebd-corne-via-svlinky
      - keebd-corne-vial-svlinky
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: keebd_corne-firmware
          name: KEEBD Corne Firmware (latest)
          body: |
            Latest KEEBD Corne Firmware, built automatically from `main`.

            Download the `.uf2` matching your keymap and controller, then flash it.
          files: firmware/*.uf2
