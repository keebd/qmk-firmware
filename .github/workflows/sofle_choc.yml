name: "Sofle Choc Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/sofle_choc.yml
    - sofle_choc/**

jobs:
  sofle_choc-default-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: sofle_choc
          keymap: default
          controller: helios
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: sofle_choc-default-helios
          path: build-output/*.uf2
          if-no-files-found: error

  sofle_choc-via-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: sofle_choc
          keymap: via
          controller: helios
          output-dir: build-output
          local-keymap-path: sofle_choc/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: sofle_choc-via-helios
          path: build-output/*.uf2
          if-no-files-found: error

  sofle_choc-vial-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@vial-qmk
        with:
          keyboard: sofle_choc
          keymap: vial
          controller: helios
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: sofle_choc-vial-helios
          path: build-output/*.uf2
          if-no-files-found: error

  sofle_choc-default-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: sofle_choc
          keymap: default
          controller: svlinky
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: sofle_choc-default-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  sofle_choc-via-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: sofle_choc
          keymap: via
          controller: svlinky
          output-dir: build-output
          local-keymap-path: sofle_choc/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: sofle_choc-via-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  sofle_choc-vial-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@vial-qmk
        with:
          keyboard: sofle_choc
          keymap: vial
          controller: svlinky
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: sofle_choc-vial-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  sofle_choc-release:
    needs:
      - sofle_choc-default-helios
      - sofle_choc-via-helios
      - sofle_choc-vial-helios
      - sofle_choc-default-svlinky
      - sofle_choc-via-svlinky
      - sofle_choc-vial-svlinky
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: sofle_choc-firmware
          name: Sofle Choc Firmware (latest)
          body: |
            Latest Sofle Choc Firmware, built automatically from `main`.

            Download the `.uf2` matching your keymap and controller, then flash it.
          files: firmware/*.uf2
