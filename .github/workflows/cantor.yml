name: "Cantor Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/cantor.yml
    - cantor/**

jobs:
  cantor-default:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: cantor
          keymap: default
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: cantor-default
          path: |
            build-output/*.uf2
            build-output/*.hex
            build-output/*.bin
          if-no-files-found: error

  cantor-release:
    needs:
      - cantor-default
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: cantor-firmware
          name: Cantor Firmware (latest)
          body: |
            Latest Cantor Firmware, built automatically from `main`.

            Download the firmware matching your keymap and controller, then flash it.
          files: |
            firmware/*.uf2
            firmware/*.hex
            firmware/*.bin
