name: "Contra Firmware"

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .github/workflows/contra.yml
    - contra/**

jobs:
  contra-default-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: contra
          keymap: default
          controller: helios
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: contra-default-helios
          path: build-output/*.uf2
          if-no-files-found: error

  contra-via-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: contra
          keymap: via
          controller: helios
          output-dir: build-output
          local-keymap-path: contra/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: contra-via-helios
          path: build-output/*.uf2
          if-no-files-found: error

  contra-vial-helios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@vial-qmk
        with:
          keyboard: contra
          keymap: vial
          controller: helios
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: contra-vial-helios
          path: build-output/*.uf2
          if-no-files-found: error

  contra-default-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: contra
          keymap: default
          controller: svlinky
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: contra-default-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  contra-via-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@main
        with:
          keyboard: contra
          keymap: via
          controller: svlinky
          output-dir: build-output
          local-keymap-path: contra/keymaps/via
      - uses: actions/upload-artifact@v4
        with:
          name: contra-via-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  contra-vial-svlinky:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: keebd/build-qmk-fw@vial-qmk
        with:
          keyboard: contra
          keymap: vial
          controller: svlinky
          output-dir: build-output
      - uses: actions/upload-artifact@v4
        with:
          name: contra-vial-svlinky
          path: build-output/*.uf2
          if-no-files-found: error

  contra-release:
    needs:
      - contra-default-helios
      - contra-via-helios
      - contra-vial-helios
      - contra-default-svlinky
      - contra-via-svlinky
      - contra-vial-svlinky
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true
      - name: Publish firmware as a rolling release
        # Pinned to a commit SHA (supply-chain hardening); Renovate bumps the
        # SHA + comment via PR. This action runs with contents: write.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: contra-firmware
          name: Contra Firmware (latest)
          body: |
            Latest Contra Firmware, built automatically from `main`.

            Download the `.uf2` matching your keymap and controller, then flash it.
          files: firmware/*.uf2
